# Fast training config for initial experiments
mode: codesign
epochs: 25
warmup_epochs: 5
batch_size: 8
num_workers: 0
pin_memory: false

optimizer:
  type: adam
  lr_recon: 3.0e-4
  lr_policy: 3.0e-3
  weight_decay: 1.0e-5
  betas: [0.9, 0.999]

scheduler:
  type: cosine
  min_lr: 1.0e-5

grad_clip_norm: 1.0
checkpoint_dir: checkpoints/
save_every_n_epochs: 25
resume: null

wandb:
  enabled: false

seed: 42
device: cpu
