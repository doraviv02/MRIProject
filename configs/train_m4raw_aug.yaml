# M4Raw training config for the SNR-AUGMENTED run. Identical to train_m4raw.yaml
# except it writes to a separate checkpoint dir so the fixed-noise results are preserved.
mode: codesign
epochs: 50
warmup_epochs: 10
batch_size: 4
num_workers: 4
pin_memory: false

optimizer:
  type: adam
  lr_recon: 3.0e-4
  lr_policy: 3.0e-3
  weight_decay: 1.0e-5
  betas: [0.9, 0.999]

scheduler:
  type: cosine
  min_lr: 1.0e-5

grad_clip_norm: 1.0
checkpoint_dir: checkpoints_m4raw_aug/
save_every_n_epochs: 10
resume: null

wandb:
  enabled: false

seed: 42
device: mps
